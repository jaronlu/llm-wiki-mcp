mcp_servers:
  llm_wiki:
    command: "uvx"
    args:
      - "llm-wiki-mcp"
    env:
      LLM_WIKI_MCP_CONFIG: "/path/to/llm-wiki.yaml"
    timeout: 120
    connect_timeout: 60

