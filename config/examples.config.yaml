wiki_root: ~/llm-wiki
# Optional bootstrap target for init_wiki when the tool call omits root.
# Example: /private/tmp/llm-wiki-mcp-smoke
init_wiki_root:
# Default deployments should stay read/candidate-first. Set this to true only
# when the MCP host is allowed to create new immutable raw sources.
allow_write_raw: false
allow_write_formal: false
allow_update_index: false
allow_modify_schema: false
log_retention_entries: 120
formal_dirs: [domains, entities]
raw_dirs: [raw]
non_formal_dirs: [drafts, reading]
